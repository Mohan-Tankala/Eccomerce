databases:
  - name: ecommerce-db
    plan: free
    databaseName: ecommerce
    user: ecommerce_user

services:
  - type: web
    name: ecommerce-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecommerce_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
