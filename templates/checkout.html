{% extends 'base.html' %}

{% block title %}Checkout - E-Commerce Store{% endblock %}

{% block content %}
<div style="padding-top: 2rem;">
    <h1>Checkout</h1>
    
    <div id="checkout-content" style="margin-top: 2rem; display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
        <div class="card">
            <h3 style="margin-bottom: 1.5rem;">Select Delivery Address</h3>
            <div id="address-list" style="display: grid; gap: 1rem; margin-bottom: 2rem;">
                <!-- Loading... -->
            </div>
            <a href="/address/" class="btn btn-outline">+ Add New Address</a>
        </div>
        
        <div id="order-summary" class="card" style="height: fit-content;">
            <!-- Loading... -->
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!auth.isAuthenticated()) window.location.href = '/login/';

    let selectedAddressId = null;
    const addressList = document.getElementById('address-list');
    const summary = document.getElementById('order-summary');

    function showSkeletons() {
        addressList.innerHTML = Array(2).fill(0).map(() => `
            <div class="card">
                <div class="skeleton" style="width: 150px; height: 1.25rem; margin-bottom: 0.5rem;"></div>
                <div class="skeleton skeleton-text" style="width: 80%;"></div>
                <div class="skeleton skeleton-text" style="width: 40%;"></div>
            </div>
        `).join('');
        summary.innerHTML = `
            <div class="skeleton" style="width: 100px; height: 1.5rem; margin-bottom: 1rem;"></div>
            <div class="skeleton" style="width: 100%; height: 2.5rem; margin-bottom: 1.5rem;"></div>
            <div class="skeleton" style="width: 100%; height: 3.5rem;"></div>
        `;
    }

    async function initCheckout() {
        showSkeletons();
        const addresses = await auth.apiFetch('/api/addresses/').then(r => r.json());
        
        if (addresses.length === 0) {
            addressList.innerHTML = '<p style="color: var(--text-muted);">No addresses found.</p>';
        } else {
            addressList.innerHTML = addresses.map(addr => `
                <div class="card" style="cursor: pointer; position: relative; border-color: ${addr.is_default ? 'var(--primary-color)' : 'var(--glass-border)'}" onclick="selectAddress(${addr.id}, this)">
                    <p style="font-weight: 600;">${addr.full_name}</p>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">${addr.street}, ${addr.city}, ${addr.zip_code}</p>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">${addr.phone}</p>
                </div>
            `).join('');
            
            const defaultAddr = addresses.find(a => a.is_default) || addresses[0];
            if (defaultAddr) selectedAddressId = defaultAddr.id;
        }

        const cart = await api.getCart();
        const summary = document.getElementById('order-summary');
        summary.innerHTML = `
            <h3 style="margin-bottom: 1.5rem;">Total Amount</h3>
            <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.5rem; margin-bottom: 2rem;">
                <span>$${cart.total}</span>
            </div>
            <button onclick="placeOrder()" class="btn btn-primary" style="width: 100%;">Place Order</button>
        `;
    }

    function selectAddress(id, el) {
        selectedAddressId = id;
        document.querySelectorAll('#address-list .card').forEach(c => c.style.borderColor = 'var(--glass-border)');
        el.style.borderColor = 'var(--primary-color)';
    }

    async function placeOrder() {
        if (!selectedAddressId) {
            ui.showNotification('Please select an address', 'error');
            return;
        }
        
        const res = await auth.apiFetch('/api/orders/create/', {
            method: 'POST',
            body: JSON.stringify({ address_id: selectedAddressId })
        });
        
        if (res.ok) {
            ui.showNotification('Order placed successfully!');
            setTimeout(() => window.location.href = '/orders/', 1500);
        } else {
            const data = await res.json();
            ui.showNotification(data.error || 'Failed to place order', 'error');
        }
    }

    initCheckout();
</script>
{% endblock %}
