{% extends 'base.html' %}

{% block title %}Login - E-Commerce Store{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2 class="text-center mb-2">Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="/register/" style="color: var(--primary-color);">Register</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        const result = await auth.login(username, password);
        if (result.ok) {
            ui.showNotification('Login successful!');
            setTimeout(() => {
                window.location.href = result.data.user.role === 'admin' ? '/admin-dashboard/' : '/';
            }, 1000);
        } else {
            ui.showNotification(result.data.detail || 'Invalid credentials', 'error');
        }
    });
</script>
{% endblock %}
