{% extends 'base.html' %}

{% block title %}Products - E-Commerce Store{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; padding-top: 2rem;">
    <div>
        <h1>Our Products</h1>
        <p style="color: var(--text-muted);">Browse our complete collection</p>
    </div>
    <div style="display: flex; gap: 1rem;">
        <select id="category-filter" class="form-control" style="padding: 0.5rem; border-radius: 0.5rem; background: var(--bg-light); color: var(--text-main); border: 1px solid var(--border-color);">
            <option value="">All Categories</option>
        </select>
        <input type="text" id="search-input" placeholder="Search products..." style="padding: 0.5rem; border-radius: 0.5rem; background: var(--bg-light); color: var(--text-main); border: 1px solid var(--border-color);">
    </div>
</div>

<div id="product-list" class="product-grid">
    <!-- Products will be loaded here -->
</div>
{% endblock %}

{% block extra_js %}
<script>
    const list = document.getElementById('product-list');

    function showSkeletons() {
        list.innerHTML = Array(6).fill(0).map(() => `
            <div class="card">
                <div class="skeleton skeleton-img"></div>
                <div class="skeleton skeleton-text" style="width: 80%;"></div>
                <div class="skeleton skeleton-text" style="width: 50%;"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                    <div class="skeleton skeleton-text" style="width: 30%;"></div>
                    <div class="skeleton skeleton-text" style="width: 40%; height: 2rem;"></div>
                </div>
            </div>
        `).join('');
    }

    async function initPage() {
        const categories = await api.getCategories();
        const filter = document.getElementById('category-filter');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.innerText = cat.name;
            filter.appendChild(opt);
        });

        loadProducts();

        filter.addEventListener('change', () => loadProducts());
        document.getElementById('search-input').addEventListener('input', (e) => {
            loadProducts({ search: e.target.value });
        });
    }

    async function loadProducts(extraParams = {}) {
        showSkeletons();
        const catId = document.getElementById('category-filter').value;
        const params = { ...extraParams };
        if (catId) params.category = catId;
        
        const products = await api.getProducts(params);
        
        if (products.length === 0) {
            list.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">No products found.</p>';
            return;
        }

        list.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/300'}" alt="${p.name}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 0; margin-bottom: 1rem; border: 1px solid var(--border-color);">
                <h3>${p.name}</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">${p.category_name}</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="price" style="margin-bottom: 0;">$${p.price}</span>
                    <a href="/products/${p.id}/" class="btn btn-primary btn-sm">View Details</a>
                </div>
            </div>
        `).join('');
    }

    initPage();
</script>
{% endblock %}
