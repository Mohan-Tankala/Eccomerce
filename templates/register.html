{% extends 'base.html' %}

{% block title %}Register - E-Commerce Store{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2 class="text-center mb-2">Create Account</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="reg-fname">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="reg-lname">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-password-confirm" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="/login/" style="color: var(--primary-color);">Login</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            first_name: document.getElementById('reg-fname').value,
            last_name: document.getElementById('reg-lname').value,
            password: document.getElementById('reg-password').value,
            password2: document.getElementById('reg-password-confirm').value
        };
        
        const result = await auth.register(data);
        if (result.id) {
            ui.showNotification('Registration successful! Please login.');
            setTimeout(() => {
                window.location.href = '/login/';
            }, 1500);
        } else {
            const errorMsg = Object.values(result).flat().join(', ');
            ui.showNotification(errorMsg || 'Registration failed', 'error');
        }
    });
</script>
{% endblock %}
