<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce Store{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">THE CHOCOLATIER</a>
                <ul class="nav-links">
                    <!-- Loaded via JS -->
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="margin-top: 5rem; padding: 3rem 0; border-top: 1px solid var(--glass-border); text-align: center; color: var(--text-muted);">
        <div class="container">
            <p>&copy; 2026 E-Commerce Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
