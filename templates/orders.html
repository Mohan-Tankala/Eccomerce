{% extends 'base.html' %}

{% block title %}My Orders - E-Commerce Store{% endblock %}

{% block content %}
<div style="padding-top: 2rem;">
    <h1>My Orders</h1>
    
    <div id="orders-list" style="margin-top: 2rem; display: grid; gap: 1.5rem;">
        <!-- Loading... -->
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!auth.isAuthenticated()) window.location.href = '/login/';

    const list = document.getElementById('orders-list');

    function showSkeletons() {
        list.innerHTML = Array(3).fill(0).map(() => `
            <div class="card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                    <div class="skeleton" style="width: 150px; height: 1.5rem;"></div>
                    <div class="skeleton" style="width: 80px; height: 1.5rem;"></div>
                </div>
                <div class="skeleton" style="width: 100%; height: 3rem; margin-bottom: 1rem;"></div>
                <div class="skeleton" style="width: 100%; height: 3rem; margin-bottom: 1rem;"></div>
                <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <div class="skeleton" style="width: 200px; height: 1rem;"></div>
                    <div class="skeleton" style="width: 100px; height: 1rem;"></div>
                </div>
            </div>
        `).join('');
    }

    async function loadOrders() {
        showSkeletons();
        const orders = await auth.apiFetch('/api/orders/').then(r => r.json());
        
        if (orders.length === 0) {
            list.innerHTML = '<div class="card text-center"><p style="color: var(--text-muted);">You haven\'t placed any orders yet.</p></div>';
            return;
        }

        list.innerHTML = orders.map(order => `
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                    <div>
                        <p style="font-weight: 700; font-size: 1.25rem;">Order #${order.id}</p>
                        <p style="font-size: 0.9rem; color: var(--text-muted);">${new Date(order.created_date).toLocaleString()}</p>
                    </div>
                    <div>
                        <span style="padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;" class="status-${order.status}">
                            ${order.status}
                        </span>
                    </div>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    ${order.items.map(item => `
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                            <img src="${item.product.image || 'https://via.placeholder.com/40'}" style="width: 40px; height: 40px; border-radius: 0.25rem;">
                            <span style="flex-grow: 1;">${item.product.name} x ${item.quantity}</span>
                            <span>$${item.price}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Shipping to: ${order.address.city}</p>
                    <p style="font-weight: 700;">Total: $${order.total_amount}</p>
                </div>
            </div>
        `).join('');
    }

    loadOrders();
</script>

<style>
    .status-pending { background: #f59e0b; color: #fff; }
    .status-confirmed { background: #3b82f6; color: #fff; }
    .status-shipped { background: #8b5cf6; color: #fff; }
    .status-delivered { background: #10b981; color: #fff; }
    .status-cancelled { background: #ef4444; color: #fff; }
</style>
{% endblock %}
