{% extends 'base.html' %}

{% block title %}Add Product - Admin - E-Commerce Store{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <div class="card">
        <h2 class="mb-2">Add New Product</h2>
        <form id="product-form">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="p-name" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="p-category" required></select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="p-price" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="p-stock" required>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="p-desc" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="p-image" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Product</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!auth.isAdmin()) window.location.href = '/';

    async function init() {
        const categories = await api.getCategories();
        const select = document.getElementById('p-category');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.innerText = cat.name;
            select.appendChild(opt);
        });
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('name', document.getElementById('p-name').value);
        formData.append('category', document.getElementById('p-category').value);
        formData.append('price', document.getElementById('p-price').value);
        formData.append('stock_quantity', document.getElementById('p-stock').value);
        formData.append('description', document.getElementById('p-desc').value);
        
        const imageFile = document.getElementById('p-image').files[0];
        if (imageFile) {
            formData.append('image', imageFile);
        }
        
        const res = await auth.apiFetch('/api/admin/products/', {
            method: 'POST',
            body: formData
        });
        
        if (res.ok) {
            ui.showNotification('Product created!');
            setTimeout(() => window.location.href = '/admin-dashboard/', 1000);
        } else {
            ui.showNotification('Failed to create product', 'error');
        }
    });

    init();
</script>
{% endblock %}
