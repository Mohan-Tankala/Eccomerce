{% extends 'base.html' %}

{% block title %}Product Detail - E-Commerce Store{% endblock %}

{% block content %}
<div id="product-detail-container">
    <!-- Loading... -->
</div>
{% endblock %}

{% block extra_js %}
<script>
    const productId = window.location.pathname.split('/')[2];
    const container = document.getElementById('product-detail-container');

    function showSkeletons() {
        container.innerHTML = `
            <div class="product-detail">
                <div class="product-image">
                    <div class="skeleton" style="width: 100%; height: 500px;"></div>
                </div>
                <div class="product-info">
                    <div class="skeleton skeleton-text" style="width: 30%;"></div>
                    <div class="skeleton skeleton-text" style="width: 60%; height: 3rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 20%; height: 2rem; margin: 1rem 0 2rem;"></div>
                    <div class="skeleton skeleton-text" style="width: 100%; height: 6rem;"></div>
                    <div style="display: flex; gap: 1rem; margin: 2rem 0;">
                        <div class="skeleton" style="width: 80px; height: 3rem;"></div>
                        <div class="skeleton" style="width: 150px; height: 1rem;"></div>
                    </div>
                    <div class="skeleton" style="width: 100%; height: 3.5rem;"></div>
                </div>
            </div>
        `;
    }

    async function loadProduct() {
        showSkeletons();
        const p = await api.getProduct(productId);
        
        container.innerHTML = `
            <div class="product-detail">
                <div class="product-image">
                    <img src="${p.image || 'https://via.placeholder.com/600'}" alt="${p.name}" style="border: 1px solid var(--border-color);">
                </div>
                <div class="product-info">
                    <p style="color: var(--primary-color); font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">${p.category_name}</p>
                    <h2>${p.name}</h2>
                    <p class="price" style="font-size: 1.5rem; margin-bottom: 1.5rem;">$${p.price}</p>
                    <p style="color: var(--text-muted); margin-bottom: 2.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">${p.description}</p>
                    
                    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
                        <input type="number" id="quantity" value="1" min="1" max="${p.stock_quantity}" style="width: 80px; padding: 0.75rem; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 0;">
                        <span style="color: var(--text-muted); font-size: 0.85rem;">${p.stock_quantity} in stock</span>
                    </div>
                    
                    <button id="add-to-cart-btn" class="btn btn-primary" style="width: 100%; padding: 1rem;">Add to Cart</button>
                    
                    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Product ID: #${p.id} | Listed on: ${new Date(p.created_date).toLocaleDateString()}</p>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('add-to-cart-btn').addEventListener('click', async (e) => {
            if (!auth.isAuthenticated()) {
                ui.showNotification('Please login to add items to cart', 'error');
                setTimeout(() => window.location.href = '/login/', 1500);
                return;
            }
            
            const btn = e.target;
            const originalText = btn.innerText;
            btn.classList.add('btn-loading');
            btn.innerText = 'Adding...';

            try {
                const qty = document.getElementById('quantity').value;
                const res = await api.addToCart(productId, qty);
                if (res.items) {
                    ui.showNotification('Successfully added to cart');
                } else {
                    ui.showNotification('Failed to add to cart', 'error');
                }
            } catch (err) {
                ui.showNotification('An error occurred', 'error');
            } finally {
                btn.classList.remove('btn-loading');
                btn.innerText = originalText;
            }
        });
    }

    loadProduct();
</script>
{% endblock %}
